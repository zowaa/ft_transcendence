version: "3.8"
volumes:
  certs:
    driver: local
  esdata01:
    driver: local
  kibanadata:
    driver: local
  logstashdata01:
    driver: local
  wordpressdb:
    name: wordpressdb
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/yrimah42/data/wp_db'
  wordpress_files:
    name: wordpress_files
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/yrimah42/data/wp_files'
  nginx_ssl:
    name: nginx_ssl
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/yrimah42/data/nginx_ssl'

networks:
  default:
    name: elastic
    external: false

services:
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - ".script.sh:/usr/share/elasticsearch/.script.sh:ro"
    env_file:
      - .env
    user: "0"
    command: "./.script.sh"
    healthcheck:
      test: ["CMD-SHELL", "[ -f config/certs/es01/es01.crt ]"]
      interval: 1s
      timeout: 5s
      retries: 120
  es01:
    depends_on:
      setup:
        condition: service_healthy
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    labels:
      co.elastic.logs/module: elasticsearch
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - esdata01:/usr/share/elasticsearch/data
    ports:
      - ${ES_PORT}:9200
    env_file:
      - .env
    mem_limit: ${ES_MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  kibana:
    depends_on:
      es01:
        condition: service_healthy
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    labels:
      co.elastic.logs/module: kibana
    volumes:
      - certs:/usr/share/kibana/config/certs
      - kibanadata:/usr/share/kibana/data
    ports:
      - ${KIBANA_PORT}:5601
    env_file:
      - .env
    mem_limit: ${KB_MEM_LIMIT}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
  
  logstash01:
    depends_on:
      es01:
        condition: service_healthy
      kibana:
        condition: service_healthy
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION}
    labels:
      co.elastic.logs/module: logstash
    user: root
    volumes:
      - certs:/usr/share/logstash/certs
      - logstashdata01:/usr/share/logstash/data
      - "./logstash_ingest_data/:/usr/share/logstash/ingest_data/"
      - "./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro"
      - "./mysql-connector-j-8.3.0.jar:/usr/share/java/mysql-connector-j-8.3.0.jar"
    environment:
      - xpack.monitoring.enabled=false
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bin/logstash-plugin install logstash-filter-ruby | grep -q 'Installation successful'",
        ]


  mariadb:
    container_name: mariadb
    build: requirements/mariadb
    image: mariadb:4
    ports:
      - 3306:3306
    restart: always
    env_file: .env
    volumes:
      - wordpressdb:/var/lib/mysql
  nginx:
    container_name: nginx
    build: requirements/nginx
    image: nginx:4
    ports:
      - 443:443
    depends_on:
      - wordpress
    env_file: .env
    volumes:
      - wordpress_files:/var/www/html
      - nginx_ssl:/etc/nginx/ssl
    restart: always
  wordpress:
    container_name: wordpress
    build: requirements/wordpress
    image: wordpress:4
    ports:
      - 9000:9000
    env_file: .env
    restart: always
    depends_on:
      - mariadb
    volumes:
      - wordpress_files:/var/www/html
  redis:
    container_name: redis
    build: requirements/bonus/redis
    image: redis:4
    ports:
      - 6379:6379
    volumes:
      - wordpress_files:/var/www/html
    env_file: .env
    depends_on:
      - wordpress
    restart: always