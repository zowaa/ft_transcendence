input {
  jdbc {
    jdbc_driver_library => "/usr/share/java/mysql-connector-j-8.3.0.jar"
    jdbc_driver_class => "com.mysql.cj.jdbc.Driver"
    jdbc_connection_string => "jdbc:mysql://mariadb:3306/wordpress"
    jdbc_user => "admin"
    jdbc_password => "admin"
    parameters => { "post_author" => 0 }
    schedule => "*/1 * * * *"
    statement => "select * from wp_posts where post_author = :post_author"
  }
}


